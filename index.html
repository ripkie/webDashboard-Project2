<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Conveyor Dashboard</title>
    <style>
        /* CSS sama persis seperti sebelumnya */
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        .item {
            margin-bottom: 8px;
        }

        .btn {
            margin-top: 10px;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-emergency {
            background: #e02020;
            color: white;
        }

        .btn-emergency-off {
            background: #1a877f;
            color: white;
        }
    </style>
</head>

<body>
    <h1>🚀 ESP32 Conveyor Dashboard</h1>

    <div class="card">
        <div class="item"><strong>Status:</strong> <span id="emergencyStatus">RUN</span></div>
        <div class="item"><strong>Counter:</strong> <span id="counter">0</span></div>
        <div class="item"><strong>PWM:</strong> <span id="pwm">0</span></div>
        <div class="item"><strong>Last Update:</strong> <span id="lastUpdate">-</span></div>
    </div>

    <div class="card">
        <label>PWM: <span id="pwmValueText">150</span></label>
        <input type="range" id="pwmSlider" min="0" max="255" value="150" style="width: 100%;">
    </div>

    <div class="card">
        <button id="toggleEmergency" class="btn btn-emergency">EMERGENCY STOP</button>
    </div>

    <script>
        // GANTI INI dengan URL Railway Anda
        const RAILWAY_URL = "https://backendrailway-production-6b59.up.railway.app";
        const WS_URL = RAILWAY_URL + "/ws";
        let ws;

        // WebSocket untuk TERIMA data real-time
        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log("✅ Connected to Railway WebSocket");
                document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateDashboard(data);
                    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
                } catch (e) {
                    console.error("JSON parse error:", e);
                }
            };

            ws.onclose = () => {
                console.log("❌ WebSocket closed, reconnecting...");
                document.getElementById("emergencyStatus").textContent = "DISCONNECTED";
                setTimeout(connectWebSocket, 2000);
            };
        }

        function updateDashboard(data) {
            document.getElementById("emergencyStatus").textContent = data.emergency ? "STOP !!" : "RUN";
            document.getElementById("counter").textContent = data.counter || 0;
            document.getElementById("pwm").textContent = data.pwm || 0;
            document.getElementById("pwmValueText").textContent = data.pwm || 150;
            document.getElementById("pwmSlider").value = data.pwm || 150;

            const btn = document.getElementById("toggleEmergency");
            if (data.emergency) {
                btn.textContent = "✅ CANCEL EMERGENCY";
                btn.className = "btn btn-emergency-off";
            } else {
                btn.textContent = "🚨 EMERGENCY STOP";
                btn.className = "btn btn-emergency";
            }
        }

        // PWM Slider - kirim via HTTP POST
        document.getElementById("pwmSlider").addEventListener("input", (e) => {
            const pwm = e.target.value;
            document.getElementById("pwmValueText").textContent = pwm;

            fetch(`${RAILWAY_URL}/api/control`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    type: "set_pwm",
                    pwm: parseInt(pwm)
                })
            }).then(() => console.log("PWM sent:", pwm));
        });

        // Emergency Button
        document.getElementById("toggleEmergency").addEventListener("click", () => {
            const isStopped = document.getElementById("emergencyStatus").textContent === "STOP !!";
            const emergency = isStopped ? 0 : 1;

            fetch(`${RAILWAY_URL}/api/control`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    type: "toggle_emergency",
                    emergency: emergency
                })
            }).then(() => console.log("Emergency:", emergency));
        });

        // Auto connect WebSocket
        connectWebSocket();
    </script>
</body>

</html>
