<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Conveyor Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .item {
            margin-bottom: 8px;
        }

        .btn {
            margin-top: 10px;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-cancel {
            background: #1a877f;
            color: white;
        }

        .btn-disabled {
            background: #bfc7ce;
            color: white;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <h1>🚀 ESP32 Conveyor Dashboard</h1>

    <div class="card">
        <div class="item"><strong>Status:</strong> <span id="emergencyStatus">RUN</span></div>
        <div class="item"><strong>Counter:</strong> <span id="counter">0</span></div>
        <div class="item"><strong>PWM:</strong> <span id="pwm">0</span></div>
        <div class="item"><strong>Last Update:</strong> <span id="lastUpdate">-</span></div>
    </div>

    <div class="card">
        <label>PWM: <span id="pwmValueText">150</span></label>
        <input type="range" id="pwmSlider" min="0" max="255" value="150" style="width: 100%;">
    </div>

    <div class="card">
        <button id="cancelEmergencyBtn" class="btn btn-disabled" disabled>✅ CANCEL EMERGENCY</button>
    </div>

    <script>
        const RAILWAY_URL = "https://backendrailway-production-6b59.up.railway.app";
        const WS_URL = RAILWAY_URL.replace(/^http/, "ws") + "/ws";
        let ws;

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log("✅ Connected to Railway WebSocket");
                document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateDashboard(data);
                    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
                } catch (e) {
                    console.error("JSON parse error:", e);
                }
            };

            ws.onclose = () => {
                console.log("❌ WebSocket closed, reconnecting...");
                document.getElementById("emergencyStatus").textContent = "EMERGENCY STOPP!!!!";
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (err) => {
                console.error("WebSocket error:", err);
            };
        }

        function updateDashboard(data) {
            const isEmergency = Number(data.emergency) === 1;

            document.getElementById("emergencyStatus").textContent = isEmergency ? "STOP !!" : "RUN";
            document.getElementById("counter").textContent = data.counter ?? 0;
            document.getElementById("pwm").textContent = data.pwm ?? 0;
            document.getElementById("pwmValueText").textContent = data.pwm ?? 150;
            document.getElementById("pwmSlider").value = data.pwm ?? 150;

            const btn = document.getElementById("cancelEmergencyBtn");

            if (isEmergency) {
                btn.disabled = false;
                btn.className = "btn btn-cancel";
            } else {
                btn.disabled = true;
                btn.className = "btn btn-disabled";
            }
        }

        document.getElementById("pwmSlider").addEventListener("input", (e) => {
            const pwm = e.target.value;
            document.getElementById("pwmValueText").textContent = pwm;

            fetch(`${RAILWAY_URL}/api/control`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    type: "set_pwm",
                    pwm: parseInt(pwm)
                })
            })
                .then(() => console.log("PWM sent:", pwm))
                .catch((err) => console.error("PWM send error:", err));
        });

        document.getElementById("cancelEmergencyBtn").addEventListener("click", () => {
            const isStopped = document.getElementById("emergencyStatus").textContent === "System Running";

            if (!isStopped) return;

            fetch(`${RAILWAY_URL}/api/control`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    type: "cancel_emergency",
                    cancel: 1
                })
            })
                .then(() => console.log("Cancel emergency sent"))
                .catch((err) => console.error("Cancel emergency error:", err));
        });

        connectWebSocket();
    </script>
</body>

</html>
